  function microScoreForSide(side, m){

  function computeMicrostructure(direction, auditOverride, baseMetrics){

    var ultra = moveStats(tailWindow(pts, 3));

    var prev = n >= 12 ? moveStats(pts.slice(Math.max(0, n - 12), Math.max(0, n - 6))) : shortTail;
    var latest = n >= 2 ? bps(pts[n - 2].price, pts[n - 1].price) : 0;

      ultraNetBps: ultra.netBps,
      microNetBps: micro.netBps,
      shortNetBps: shortTail.netBps,
      previousMicroNetBps: prev.netBps,
      lastMoveBps: latest,

      microPressure: microPressure,
